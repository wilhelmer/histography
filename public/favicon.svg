<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#1a1a2e"/>
  <!-- Globe grid lines -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#2a4a6e" stroke-width="1.2"/>
  <ellipse cx="16" cy="16" rx="5.5" ry="11" fill="none" stroke="#2a4a6e" stroke-width="1"/>
  <line x1="5" y1="16" x2="27" y2="16" stroke="#2a4a6e" stroke-width="1"/>
  <line x1="7" y1="10.5" x2="25" y2="10.5" stroke="#2a4a6e" stroke-width="0.8"/>
  <line x1="7" y1="21.5" x2="25" y2="21.5" stroke="#2a4a6e" stroke-width="0.8"/>
  <!-- Birth pin (green) -->
  <circle cx="11" cy="13" r="2.8" fill="#4caf50"/>
  <circle cx="11" cy="13" r="1.2" fill="#1a1a2e"/>
  <!-- Death pin (red) -->
  <circle cx="21" cy="19" r="2.8" fill="#f44336"/>
  <circle cx="21" cy="19" r="1.2" fill="#1a1a2e"/>
</svg>
