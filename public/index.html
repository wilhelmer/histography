<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histography</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <div id="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" aria-hidden="true">
          <circle cx="24" cy="24" r="23" fill="#16213e" stroke="#2a4a6e" stroke-width="1.5"/>
          <circle cx="24" cy="24" r="17" fill="none" stroke="#2a4a6e" stroke-width="1.2"/>
          <ellipse cx="24" cy="24" rx="8.5" ry="17" fill="none" stroke="#2a4a6e" stroke-width="1"/>
          <line x1="7" y1="24" x2="41" y2="24" stroke="#2a4a6e" stroke-width="1"/>
          <line x1="9.5" y1="15.5" x2="38.5" y2="15.5" stroke="#2a4a6e" stroke-width="0.8"/>
          <line x1="9.5" y1="32.5" x2="38.5" y2="32.5" stroke="#2a4a6e" stroke-width="0.8"/>
          <!-- Birth pin -->
          <circle cx="17" cy="20" r="4" fill="#4caf50"/>
          <circle cx="17" cy="20" r="1.7" fill="#16213e"/>
          <!-- Death pin -->
          <circle cx="32" cy="29" r="4" fill="#f44336"/>
          <circle cx="32" cy="29" r="1.7" fill="#16213e"/>
        </svg>
        <h1>Histography</h1>
      </div>
      <p class="subtitle">Who is this historical figure?</p>
    </header>

    <div id="map-container">
      <svg id="world-map" viewBox="0 0 960 500" preserveAspectRatio="xMidYMid meet">
        <g id="map-root">
          <g id="countries"></g>
          <g id="markers"></g>
        </g>
      </svg>
      <button id="zoom-reset" title="Reset zoom">⊙</button>
    </div>

    <div id="legend">
      <span class="legend-item birth">● Birth location</span>
      <span class="legend-item death">● Death location</span>
    </div>

    <div id="game-panel">
      <div id="message-area"></div>

      <div id="input-area">
        <input type="text" id="guess-input" placeholder="Enter the historical figure's name…" autocomplete="off" spellcheck="false">
        <div id="controls">
          <button id="submit-btn">Submit</button>
          <button id="hint-btn">Hint</button>
          <button id="giveup-btn">Give up</button>
        </div>
      </div>

      <div id="attempts-area">
        <span id="attempts-label"></span>
        <div id="attempt-dots"></div>
      </div>

      <div id="hint-area"></div>

      <button id="play-again-btn" style="display:none">Play Again</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
